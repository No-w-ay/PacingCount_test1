<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d1b2">
    <title>PacingCount Pro</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #00d1b2;
            --danger: #ff3860;
            --nav-bg: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 70px; /* Espace pour la barre de navigation */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Système de pages */
        .page {
            display: none; /* Caché par défaut */
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }
        .page.active { display: flex; }

        h1 { color: var(--accent); font-weight: 300; }

        /* Chronos Card */
        .timer-card {
            background: var(--card);
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .timer-card.active { border-color: var(--accent); transform: scale(1.02); }
        .time-display { font-size: 2.8rem; font-family: monospace; margin-bottom: 10px; }

        /* Boutons */
        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn-start { background: #363636; color: white; }
        .active .btn-start { background: var(--accent); color: black; }
        .btn-reset { background: var(--danger); color: white; margin-top: 20px; }

        /* Liste des résultats */
        .res-item {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Barre de navigation basse */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 100;
        }
        nav button {
            background: none;
            color: #888;
            width: auto;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav button.active { color: var(--accent); }

        #save-indicator { font-size: 0.7rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <main id="page-chronos" class="page active">
        <h1>Chronos</h1>
        <div id="card-0" class="timer-card">
            <div id="display-0" class="time-display">00:00:00</div>
            <button class="btn-start" onclick="toggleTimer(0)">Chrono 1</button>
        </div>
        <div id="card-1" class="timer-card">
            <div id="display-1" class="time-display">00:00:00</div>
            <button class="btn-start" onclick="toggleTimer(1)">Chrono 2</button>
        </div>
        <div id="card-2" class="timer-card">
            <div id="display-2" class="time-display">00:00:00</div>
            <button class="btn-start" onclick="toggleTimer(2)">Chrono 3</button>
        </div>
        <div id="save-indicator"></div>
    </main>

    <main id="page-resultats" class="page">
        <h1>Résultats</h1>
        <div id="results-list" style="width:100%"></div>
        <button onclick="exportTimes()" style="background:var(--accent); color:black; margin-top:20px;">Partager</button>
        <button class="btn-reset" onclick="resetAll()">Réinitialiser tout</button>
    </main>

    <main id="page-reglages" class="page">
        <h1>Réglages</h1>
        <p>Les fonctionnalités de réglages arriveront bientôt.</p>
        <div style="background:var(--card); padding:20px; border-radius:15px; width:100%;">
            <label>Mode sombre : Activé</label>
        </div>
    </main>

    <nav>
        <button onclick="showPage('chronos')" id="nav-chronos" class="active">⏱<br>Chronos</button>
        <button onclick="showPage('resultats')" id="nav-resultats">📊<br>Résultats</button>
        <button onclick="showPage('reglages')" id="nav-reglages">⚙️<br>Réglages</button>
    </nav>

    <script>
        let times = JSON.parse(localStorage.getItem('pacingTimes')) || [0, 0, 0];
        let activeTimer = null;
        let lastTimestamp = null;
        let lastSaveTime = Date.now();

        // --- NAVIGATION ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');

            if(pageId === 'resultats') updateResultsList();
        }

        // --- LOGIQUE CHRONO ---
        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            let m = Math.floor(s / 60);
            let h = Math.floor(m / 60);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(h)}:${pad(m % 60)}:${pad(s % 60)}`;
        }

        function toggleTimer(index) {
            const now = Date.now();
            if (activeTimer !== null) {
                times[activeTimer] += (now - lastTimestamp);
            }
            if (activeTimer === index) {
                activeTimer = null;
            } else {
                activeTimer = index;
                lastTimestamp = now;
            }
            saveToDisk();
            updateUI();
        }

        function updateUI() {
            for (let i = 0; i < 3; i++) {
                const el = document.getElementById(`display-${i}`);
                if(el) el.innerText = formatTime(times[i]);
                const card = document.getElementById(`card-${i}`);
                if(card) card.classList.toggle('active', activeTimer === i);
            }
        }

        function updateResultsList() {
            const list = document.getElementById('results-list');
            list.innerHTML = times.map((t, i) => `
                <div class="res-item">
                    <span>Chrono ${i+1}</span>
                    <strong>${formatTime(t)}</strong>
                </div>
            `).join('');
        }

        function saveToDisk() {
            localStorage.setItem('pacingTimes', JSON.stringify(times));
            lastSaveTime = Date.now();
            const ind = document.getElementById('save-indicator');
            ind.innerText = "Sauvegardé " + new Date().toLocaleTimeString();
        }

        function resetAll() {
            if(confirm("Réinitialiser ?")) {
                times = [0, 0, 0];
                activeTimer = null;
                saveToDisk();
                updateUI();
                updateResultsList();
            }
        }

        function exportTimes() {
            const texte = times.map((t,i) => `Chrono ${i+1}: ${formatTime(t)}`).join('\n');
            if (navigator.share) navigator.share({ title: 'PacingCount', text: texte });
            else alert(texte);
        }

        setInterval(() => {
            if (activeTimer !== null) {
                const now = Date.now();
                const delta = now - lastTimestamp;
                let currentTimeDisplay = times[activeTimer] + delta;
                const display = document.getElementById(`display-${activeTimer}`);
                if(display) display.innerText = formatTime(currentTimeDisplay);

                if (now - lastSaveTime >= 30000) {
                    times[activeTimer] += (now - lastTimestamp);
                    lastTimestamp = now;
                    saveToDisk();
                }
            }
        }, 100);

        updateUI();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
