<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d1b2">
    <title>PacingCount Pro</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #00d1b2;
            --danger: #ff3860;
            --info: #209cee;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: var(--accent); margin-bottom: 20px; font-weight: 300; }
        
        .timer-card {
            background: var(--card);
            width: 100%;
            max-width: 350px;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .timer-card.active {
            border-color: var(--accent);
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 209, 178, 0.3);
        }
        .time-display {
            font-size: 3rem;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.98); }

        .btn-start { background-color: #363636; color: white; }
        .active .btn-start { background-color: var(--accent); color: #000; }
        
        .controls {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-export { background-color: var(--info); color: white; }
        .btn-reset { background-color: var(--danger); color: white; }

        #save-indicator {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
            height: 1rem;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <h1>PacingCount</h1>

    <div id="card-0" class="timer-card">
        <div id="display-0" class="time-display">00:00:00</div>
        <button class="btn-start" onclick="toggleTimer(0)">Chrono 1</button>
    </div>

    <div id="card-1" class="timer-card">
        <div id="display-1" class="time-display">00:00:00</div>
        <button class="btn-start" onclick="toggleTimer(1)">Chrono 2</button>
    </div>

    <div id="card-2" class="timer-card">
        <div id="display-2" class="time-display">00:00:00</div>
        <button class="btn-start" onclick="toggleTimer(2)">Chrono 3</button>
    </div>

    <div class="controls">
        <button class="btn-export" onclick="exportTimes()">Partager les résultats</button>
        <button class="btn-reset" onclick="resetAll()">Réinitialiser tout</button>
    </div>

    <div id="save-indicator"></div>

    <script>
        // Initialisation
        let times = JSON.parse(localStorage.getItem('pacingTimes')) || [0, 0, 0];
        let activeTimer = null;
        let lastTimestamp = null;
        let lastSaveTime = Date.now();

        const indicator = document.getElementById('save-indicator');

        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            let m = Math.floor(s / 60);
            let h = Math.floor(m / 60);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(h)}:${pad(m % 60)}:${pad(s % 60)}`;
        }

        function toggleTimer(index) {
            if (activeTimer === index) {
                activeTimer = null;
            } else {
                activeTimer = index;
                lastTimestamp = Date.now();
            }
            saveToDisk(); // Sauvegarde immédiate au clic
            updateUI();
        }
